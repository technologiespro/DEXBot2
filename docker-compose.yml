services:
  dexbot:
    image: ${DEXBOT_IMAGE:-ghcr.io/froooze/dexbot2:latest}
    container_name: dexbot2
    restart: unless-stopped
    user: ${DEXBOT_UID:-1000}:${DEXBOT_GID:-1000}
    working_dir: /app
    stdin_open: true
    tty: true
    environment:
      BOT_NAME: ${BOT_NAME:-}
      OPEN_ORDERS_SYNC_LOOP_MS: ${OPEN_ORDERS_SYNC_LOOP_MS:-5000}
    volumes:
      - ./profiles:/app/profiles
      - ./market_adapter/data:/app/market_adapter/data
      - ./market_adapter/state:/app/market_adapter/state
