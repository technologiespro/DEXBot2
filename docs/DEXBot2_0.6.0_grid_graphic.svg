<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="920" viewBox="0 0 1400 920" role="img" aria-labelledby="title desc">
  <title id="title">Grid bot order graphic</title>
  <desc id="desc">Symmetrical horizontal chart showing buy orders on the left and sell orders on the right around a central spread zone, with mountain and valley order size distributions.</desc>

  <defs>
    <linearGradient id="buyBar" x1="0" y1="1" x2="0" y2="0">
      <stop offset="0%" stop-color="#4a9e2a"/>
      <stop offset="100%" stop-color="#7ccf52"/>
    </linearGradient>
    <linearGradient id="sellBar" x1="0" y1="1" x2="0" y2="0">
      <stop offset="0%" stop-color="#c4a822"/>
      <stop offset="100%" stop-color="#e2d24a"/>
    </linearGradient>
    <linearGradient id="spreadGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1e3a5f"/>
      <stop offset="100%" stop-color="#162d4a"/>
    </linearGradient>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#5a7a3a"/>
    </marker>
    <style>
      .title { font: 700 32px Arial, sans-serif; fill: #b5c43a; }
      .subtitle { font: 400 17px Arial, sans-serif; fill: #8a9a5a; }
      .section { font: 700 18px Arial, sans-serif; fill: #b5c43a; }
      .label { font: 600 16px Arial, sans-serif; fill: #b5c43a; }
      .small { font: 400 14px Arial, sans-serif; fill: #7a8a50; }
      .barLabel { font: 700 13px Arial, sans-serif; fill: #0d1b2a; }
      .axisLabel { font: 600 14px Arial, sans-serif; fill: #8a9a5a; }
      .axisText { font: 400 13px Arial, sans-serif; fill: #6a7a4a; }
      .note { font: 400 15px Arial, sans-serif; fill: #b5c43a; }
      .mono { font: 600 14px Arial, sans-serif; fill: #6a7a4a; }
      .spreadLabel { font: 700 16px Arial, sans-serif; fill: #4a8abf; }
      .priceLabel { font: 600 14px Arial, sans-serif; fill: #4a8abf; }
      .miniTitle { font: 700 14px Arial, sans-serif; fill: #b5c43a; }
      .miniLabel { font: 400 12px Arial, sans-serif; fill: #7a8a50; }
    </style>
  </defs>

  <!-- Background -->
  <rect x="0" y="0" width="1400" height="920" fill="#0d1b2a"/>

  <!-- Title -->
  <text x="700" y="42" class="title" text-anchor="middle">Grid Bot - Order Distribution</text>
  <text x="700" y="68" class="subtitle" text-anchor="middle">Buy orders (left) and sell orders (right) placed symmetrically around the market price spread zone</text>

  <!-- ═══════════════ MAIN CHART ═══════════════ -->
  <!-- Chart background -->
  <rect x="60" y="90" width="1280" height="500" rx="20" fill="#101e30" stroke="#1e3a5f" stroke-width="1.5"/>

  <!-- Axis labels -->
  <text x="700" y="575" class="axisLabel" text-anchor="middle">Price</text>
  <line x1="120" y1="540" x2="1280" y2="540" stroke="#1e3a5f" stroke-width="1.5"/>

  <!-- Price arrow left -->
  <line x1="120" y1="548" x2="140" y2="548" stroke="#5a7a3a" stroke-width="1.5" marker-start="url(#arrow)"/>
  <text x="152" y="553" class="axisText">Lower</text>

  <!-- Price arrow right -->
  <line x1="1260" y1="548" x2="1280" y2="548" stroke="#5a7a3a" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="1200" y="553" class="axisText">Higher</text>

  <!-- Amount axis -->
  <text x="85" y="320" class="axisLabel" text-anchor="middle" transform="rotate(-90 85 320)">Order Size</text>

  <!-- Grid lines (horizontal) -->
  <line x1="120" y1="170" x2="1280" y2="170" stroke="#152538" stroke-width="1"/>
  <line x1="120" y1="250" x2="1280" y2="250" stroke="#152538" stroke-width="1"/>
  <line x1="120" y1="330" x2="1280" y2="330" stroke="#152538" stroke-width="1"/>
  <line x1="120" y1="410" x2="1280" y2="410" stroke="#152538" stroke-width="1"/>
  <line x1="120" y1="490" x2="1280" y2="490" stroke="#152538" stroke-width="1"/>

  <!-- ── SPREAD ZONE (center) ── -->
  <rect x="650" y="110" width="100" height="430" rx="6" fill="url(#spreadGrad)" stroke="#2a5a8f" stroke-width="1.5" stroke-dasharray="6 4" opacity="0.8"/>
  <text x="700" y="135" class="spreadLabel" text-anchor="middle">Spread</text>
  <text x="700" y="153" class="small" text-anchor="middle" fill="#4a8abf">Zone</text>

  <!-- Market price line -->
  <line x1="700" y1="160" x2="700" y2="540" stroke="#2a6aaf" stroke-width="2.5" stroke-dasharray="8 6" opacity="0.5"/>
  <circle cx="700" cy="540" r="5" fill="#4a8abf"/>
  <text x="700" y="565" class="priceLabel" text-anchor="middle">Market Price</text>

  <!-- ── BUY ORDERS (left side - mountain shape: tallest near center) ── -->
  <!-- BUY 5 (outermost, lowest price) -->
  <rect x="145" y="430" width="88" height="100" rx="6" fill="url(#buyBar)" opacity="0.65"/>
  <text x="189" y="488" class="barLabel" text-anchor="middle">BUY 5</text>
  <text x="189" y="553" class="axisText" text-anchor="middle">P-5</text>

  <!-- BUY 4 -->
  <rect x="248" y="360" width="88" height="170" rx="6" fill="url(#buyBar)" opacity="0.75"/>
  <text x="292" y="455" class="barLabel" text-anchor="middle">BUY 4</text>
  <text x="292" y="553" class="axisText" text-anchor="middle">P-4</text>

  <!-- BUY 3 -->
  <rect x="351" y="280" width="88" height="250" rx="6" fill="url(#buyBar)" opacity="0.85"/>
  <text x="395" y="415" class="barLabel" text-anchor="middle">BUY 3</text>
  <text x="395" y="553" class="axisText" text-anchor="middle">P-3</text>

  <!-- BUY 2 -->
  <rect x="454" y="210" width="88" height="320" rx="6" fill="url(#buyBar)" opacity="0.92"/>
  <text x="498" y="380" class="barLabel" text-anchor="middle">BUY 2</text>
  <text x="498" y="553" class="axisText" text-anchor="middle">P-2</text>

  <!-- BUY 1 (nearest center, tallest) -->
  <rect x="557" y="150" width="88" height="380" rx="6" fill="url(#buyBar)"/>
  <text x="601" y="350" class="barLabel" text-anchor="middle">BUY 1</text>
  <text x="601" y="553" class="axisText" text-anchor="middle">P-1</text>

  <!-- ── SELL ORDERS (right side - mountain shape: tallest near center) ── -->
  <!-- SELL 1 (nearest center, tallest) -->
  <rect x="755" y="150" width="88" height="380" rx="6" fill="url(#sellBar)"/>
  <text x="799" y="350" class="barLabel" text-anchor="middle">SELL 1</text>
  <text x="799" y="553" class="axisText" text-anchor="middle">P+1</text>

  <!-- SELL 2 -->
  <rect x="858" y="210" width="88" height="320" rx="6" fill="url(#sellBar)" opacity="0.92"/>
  <text x="902" y="380" class="barLabel" text-anchor="middle">SELL 2</text>
  <text x="902" y="553" class="axisText" text-anchor="middle">P+2</text>

  <!-- SELL 3 -->
  <rect x="961" y="280" width="88" height="250" rx="6" fill="url(#sellBar)" opacity="0.85"/>
  <text x="1005" y="415" class="barLabel" text-anchor="middle">SELL 3</text>
  <text x="1005" y="553" class="axisText" text-anchor="middle">P+3</text>

  <!-- SELL 4 -->
  <rect x="1064" y="360" width="88" height="170" rx="6" fill="url(#sellBar)" opacity="0.75"/>
  <text x="1108" y="455" class="barLabel" text-anchor="middle">SELL 4</text>
  <text x="1108" y="553" class="axisText" text-anchor="middle">P+4</text>

  <!-- SELL 5 (outermost, highest price) -->
  <rect x="1167" y="430" width="88" height="100" rx="6" fill="url(#sellBar)" opacity="0.65"/>
  <text x="1211" y="488" class="barLabel" text-anchor="middle">SELL 5</text>
  <text x="1211" y="553" class="axisText" text-anchor="middle">P+5</text>

  <!-- Mountain envelope curve (dashed) -->
  <path d="M 189 430 Q 395 120 601 150 L 601 150" stroke="#5aaf32" stroke-width="2" stroke-dasharray="5 4" fill="none" opacity="0.4"/>
  <path d="M 799 150 Q 1005 120 1211 430" stroke="#c4a822" stroke-width="2" stroke-dasharray="5 4" fill="none" opacity="0.4"/>

  <!-- Side labels -->
  <text x="350" y="118" class="section" text-anchor="middle" fill="#6bc942">BUY SIDE (Bids)</text>
  <text x="1050" y="118" class="section" text-anchor="middle" fill="#d4be32">SELL SIDE (Asks)</text>

  <!-- Blue accent line (matching website) -->
  <line x1="60" y1="595" x2="1340" y2="595" stroke="#2a5a8f" stroke-width="2"/>

  <!-- ═══════════════ BOTTOM PANELS ═══════════════ -->

  <!-- Mountain vs Valley comparison -->
  <rect x="60" y="605" width="420" height="285" rx="16" fill="#101e30" stroke="#1e3a5f" stroke-width="1.5"/>
  <text x="270" y="637" class="section" text-anchor="middle">Order Size Patterns</text>

  <!-- Mountain mini chart -->
  <text x="165" y="665" class="miniTitle" text-anchor="middle">Mountain</text>
  <text x="165" y="681" class="miniLabel" text-anchor="middle">Largest orders near spread</text>
  <!-- mini bars mountain -->
  <rect x="100" y="750" width="18" height="30" rx="3" fill="#5a7a3a" opacity="0.55"/>
  <rect x="122" y="735" width="18" height="45" rx="3" fill="#5a7a3a" opacity="0.65"/>
  <rect x="144" y="710" width="18" height="70" rx="3" fill="#5a7a3a" opacity="0.8"/>
  <rect x="166" y="695" width="18" height="85" rx="3" fill="#5a7a3a"/>
  <rect x="188" y="710" width="18" height="70" rx="3" fill="#5a7a3a" opacity="0.8"/>
  <rect x="210" y="735" width="18" height="45" rx="3" fill="#5a7a3a" opacity="0.65"/>
  <rect x="232" y="750" width="18" height="30" rx="3" fill="#5a7a3a" opacity="0.55"/>
  <line x1="100" y1="780" x2="250" y2="780" stroke="#1e3a5f" stroke-width="1"/>
  <!-- mountain peak line -->
  <path d="M 109 750 Q 175 685 241 750" stroke="#b5c43a" stroke-width="1.5" stroke-dasharray="3 3" fill="none" opacity="0.6"/>

  <!-- Valley mini chart -->
  <text x="375" y="665" class="miniTitle" text-anchor="middle">Valley</text>
  <text x="375" y="681" class="miniLabel" text-anchor="middle">Smallest orders near spread</text>
  <!-- mini bars valley -->
  <rect x="310" y="695" width="18" height="85" rx="3" fill="#5a7a3a"/>
  <rect x="332" y="710" width="18" height="70" rx="3" fill="#5a7a3a" opacity="0.8"/>
  <rect x="354" y="735" width="18" height="45" rx="3" fill="#5a7a3a" opacity="0.65"/>
  <rect x="376" y="750" width="18" height="30" rx="3" fill="#5a7a3a" opacity="0.55"/>
  <rect x="398" y="735" width="18" height="45" rx="3" fill="#5a7a3a" opacity="0.65"/>
  <rect x="420" y="710" width="18" height="70" rx="3" fill="#5a7a3a" opacity="0.8"/>
  <rect x="442" y="695" width="18" height="85" rx="3" fill="#5a7a3a"/>
  <line x1="310" y1="780" x2="460" y2="780" stroke="#1e3a5f" stroke-width="1"/>
  <!-- valley dip line -->
  <path d="M 319 695 Q 385 760 451 695" stroke="#b5c43a" stroke-width="1.5" stroke-dasharray="3 3" fill="none" opacity="0.6"/>

  <!-- Divider between mini charts -->
  <line x1="270" y1="655" x2="270" y2="870" stroke="#1e3a5f" stroke-width="1"/>

  <text x="270" y="825" class="small" text-anchor="middle">The main chart above shows the Mountain pattern.</text>
  <text x="270" y="845" class="small" text-anchor="middle">Pattern affects how liquidity concentrates</text>
  <text x="270" y="865" class="small" text-anchor="middle">around the market price.</text>

  <!-- How it works panel -->
  <rect x="510" y="605" width="420" height="285" rx="16" fill="#101e30" stroke="#1e3a5f" stroke-width="1.5"/>
  <text x="720" y="637" class="section" text-anchor="middle">How the Grid Reacts</text>

  <circle cx="548" cy="675" r="14" fill="#4a9e2a"/>
  <text x="548" y="680" class="barLabel" text-anchor="middle">1</text>
  <text x="572" y="671" class="note">A fill occurs (buy or sell side)</text>
  <text x="572" y="689" class="small">Funds return to the opposite side</text>

  <circle cx="548" cy="730" r="14" fill="#2a6aaf"/>
  <text x="548" y="735" class="barLabel" text-anchor="middle">2</text>
  <text x="572" y="726" class="note">Boundary crawls toward the fill</text>
  <text x="572" y="744" class="small">Order roles shift: buy becomes sell or vice versa</text>

  <circle cx="548" cy="785" r="14" fill="#c4a822"/>
  <text x="548" y="790" class="barLabel" text-anchor="middle">3</text>
  <text x="572" y="781" class="note">Replacement orders are placed</text>
  <text x="572" y="799" class="small">Grid stays geometric and spread-aware</text>

  <line x1="540" y1="820" x2="900" y2="820" stroke="#1e3a5f" stroke-width="1"/>
  <text x="720" y="845" class="small" text-anchor="middle">The spread zone always stays between the</text>
  <text x="720" y="863" class="small" text-anchor="middle">innermost buy and sell, tracking the market.</text>

  <!-- Key properties panel -->
  <rect x="960" y="605" width="380" height="285" rx="16" fill="#101e30" stroke="#1e3a5f" stroke-width="1.5"/>
  <text x="1150" y="637" class="section" text-anchor="middle">Key Properties</text>

  <circle cx="992" cy="668" r="5" fill="#b5c43a"/>
  <text x="1008" y="673" class="note">Dual-sided buy and sell placement</text>

  <circle cx="992" cy="700" r="5" fill="#b5c43a"/>
  <text x="1008" y="705" class="note">Geometric spacing between slots</text>

  <circle cx="992" cy="732" r="5" fill="#b5c43a"/>
  <text x="1008" y="737" class="note">Configurable spread percentage</text>

  <circle cx="992" cy="764" r="5" fill="#b5c43a"/>
  <text x="1008" y="769" class="note">Mountain or valley size distribution</text>

  <circle cx="992" cy="796" r="5" fill="#b5c43a"/>
  <text x="1008" y="801" class="note">Boundary-crawl follows the market</text>

  <circle cx="992" cy="828" r="5" fill="#b5c43a"/>
  <text x="1008" y="833" class="note">Rebalances only when orders fill</text>

  <circle cx="992" cy="860" r="5" fill="#b5c43a"/>
  <text x="1008" y="865" class="note">Automatic grid regeneration on drift</text>

  <!-- Footer -->
  <text x="700" y="912" class="mono" text-anchor="middle">Grid order distribution overview</text>
</svg>
